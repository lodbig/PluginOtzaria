<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Material Design 3 - מערכת צבעים אופליין */
    :root {
      --md-sys-color-primary: #f6eee4;
      --md-sys-color-on-primary: #FFFFFF;
      --md-sys-color-primary-container: #efd5ad;
      --md-sys-color-on-primary-container: #0c0121;
      --md-sys-color-surface: #FEF7FF;
      --md-sys-color-on-surface: #1D1B20;
      --md-sys-color-surface-container: #f6eee4;
      --md-sys-color-outline: #79747E;
      --md-sys-color-error: #B3261E;
      --md-font: system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      font-family: var(--md-font);
      background-color: var(--md-sys-color-surface);
      color: var(--md-sys-color-on-surface);
      margin: 0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* סרגל צד - אזור רשימות */
    .sidebar {
      width: 280px;
      background: var(--md-sys-color-surface-container);
      border-left: 1px solid var(--md-sys-color-outline);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(0,0,0,0.1);
    }
    .nav-list {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 50px;
      padding: 0 16px;
      border-radius: 25px;
      cursor: pointer;
      margin-bottom: 8px;
      border: 1px solid transparent;
      transition: background 0.2s;
    }
    .nav-item:hover { background: rgba(0,0,0,0.04); }
    .nav-item.active {
      background: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
      font-weight: bold;
    }
    .nav-item-actions { display: flex; gap: 4px; }

    /* אזור תוכן ראשי */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 24px;
      overflow-y: auto;
      background: var(--md-sys-color-surface);
    }
    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    /* כפתורים מבוססי Material */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 40px;
      padding: 0 16px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-weight: 500;
      font-family: inherit;
      font-size: 14px;
      transition: opacity 0.2s, background-color 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .btn-filled { background: var(--md-sys-color-primary); color: var(--md-sys-color-on-primary); }
    .btn-outlined { background: transparent; border: 1px solid var(--md-sys-color-outline); color: var(--md-sys-color-primary); }
    .btn-outlined.active { background: var(--md-sys-color-primary-container); border-color: transparent; }
    
    .icon-btn {
      width: 36px;
      height: 36px;
      border-radius: 18px;
      border: none;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: inherit;
      transition: background 0.2s;
    }
    .icon-btn:hover { background: rgba(0,0,0,0.08); }
    .icon-btn.danger:hover { background-color: #F9DEDC; color: var(--md-sys-color-error); }
    .icon-btn svg { width: 20px; height: 20px; fill: currentColor; }

    /* כרטיסיות מראי מקומות */
    .content-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      border: 1px solid var(--md-sys-color-outline);
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: all 0.2s ease;
    }
    
    /* עיצוב קריא (ללא כרטיסיות מופרדות, עם קווים) */
    .content-list.readable-design { gap: 0; }
    .content-list.readable-design .card {
      border: none;
      border-bottom: 1px solid rgba(0,0,0,0.1);
      border-radius: 0;
      background: transparent;
      padding: 16px 8px;
    }
    .content-list.readable-design .card:last-child { border-bottom: none; }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .book-info { display: flex; flex-direction: column; }
    .book-name { font-weight: 700; font-size: 16px; }
    .book-ref { font-size: 13px; color: var(--md-sys-color-primary); margin-top: 2px; }
    .card-text {
      font-size: 14px;
      line-height: 1.6;
      color: #49454F;
      background: rgba(0,0,0,0.02);
      padding: 12px;
      border-radius: 8px;
      white-space: pre-wrap;
    }
    .card-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 4px;
    }

    /* עיצוב החוצץ (Separator) */
    .separator {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      background-color: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
      border-radius: 12px;
      margin: 12px 0;
      font-weight: bold;
    }
    .content-list.readable-design .separator {
       margin: 24px 0 12px 0;
       border-radius: 8px;
    }
    .separator-title { flex: 1; font-size: 16px; }

    .empty-state { text-align: center; margin-top: 60px; color: var(--md-sys-color-outline); font-size: 16px; }

    /* Modal System */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: none; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal {
      background: var(--md-sys-color-surface); width: 340px; padding: 24px; border-radius: 28px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .modal-title { font-size: 1.4rem; font-weight: bold; margin-bottom: 16px; color: var(--md-sys-color-primary); }
    .modal-input {
      width: 100%; padding: 12px; border: 1px solid var(--md-sys-color-outline);
      border-radius: 8px; margin-bottom: 24px; font-family: inherit; font-size: 14px;
    }
    .modal-btns { display: flex; justify-content: flex-end; gap: 8px; }

  </style>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-header">
      <span style="font-weight: bold; font-size: 18px;">מראי מקומות</span>
      <button class="icon-btn" onclick="openAddListModal()" title="רשימה חדשה">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      </button>
    </div>
    <div class="nav-list" id="nav-list"></div>
  </div>

  <div class="main">
    <div class="toolbar">
      <button class="btn btn-filled" onclick="exportToClipboard()">
        <svg style="width:18px;height:18px;margin-left:6px;fill:currentColor;" viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        העתק ללוח
      </button>
      <button class="btn btn-outlined" onclick="openAddSeparatorModal()">
        <svg style="width:18px;height:18px;margin-left:6px;fill:currentColor;" viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        הוסף חוצץ
      </button>
      <button class="btn btn-outlined active" id="btn-readable" onclick="toggleReadable()">
        עיצוב קריא
      </button>
    </div>
    <div id="content-list" class="content-list"></div>
  </div>

  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <div id="modal-title" class="modal-title"></div>
      <div id="modal-content"></div>
      <div class="modal-btns">
        <button class="btn btn-outlined" onclick="closeModal()">ביטול</button>
        <button class="btn btn-filled" id="modal-confirm-btn">אישור</button>
      </div>
    </div>
  </div>

  <script>
    // --- Icons ---
    const ICON_DEL = `<svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>`;
    const ICON_UP = `<svg viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>`;
    const ICON_DOWN = `<svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>`;
    const ICON_EDIT = `<svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>`;
    const ICON_FOLDER = `<svg viewBox="0 0 24 24"><path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/></svg>`;

    // --- State ---
    let state = {
      lists: ['כללי'],
      currentList: 'כללי',
      items: [],
      isReadable: false
    };

    // --- Initialization ---
    Otzaria.on('plugin.boot', async (p) => {
      if (p && p.theme && p.theme.colorScheme) applyTheme(p.theme.colorScheme);
      
      await Otzaria.call('reader.addContextMenuItem', {
        id: 'add-to-bookmarks-manager',
        label: 'שמור למראי מקומות',
        icon: 'bookmark'
      });

      await loadLists();
    });

    function applyTheme(colors) {
      if(!colors) return;
      const r = document.documentElement;
      if (colors.primary) r.style.setProperty('--md-sys-color-primary', colors.primary);
      if (colors.surface) r.style.setProperty('--md-sys-color-surface', colors.surface);
    }

    // --- Modal System ---
    function openModal(title, html, onConfirm) {
      const overlay = document.getElementById('modal-overlay');
      document.getElementById('modal-title').innerText = title;
      document.getElementById('modal-content').innerHTML = html;
      const confirmBtn = document.getElementById('modal-confirm-btn');
      
      confirmBtn.replaceWith(confirmBtn.cloneNode(true));
      document.getElementById('modal-confirm-btn').onclick = async () => { 
        await onConfirm(); 
        closeModal(); 
      };
      
      overlay.style.display = 'flex';
      const input = document.getElementById('modal-in');
      if(input) input.focus();
    }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    // --- Data Loaders ---
    async function loadLists() {
      const { data: storedLists } = await Otzaria.call('storage.get', { key: 'plugin_lists' });
      if (storedLists && Array.isArray(storedLists) && storedLists.length > 0) {
        state.lists = storedLists;
      } else {
        state.lists = ['כללי'];
        await Otzaria.call('storage.set', { key: 'plugin_lists', value: state.lists });
      }
      
      const lastActive = localStorage.getItem('activeBookmarkList');
      if (lastActive && state.lists.includes(lastActive)) {
        state.currentList = lastActive;
      } else {
        state.currentList = state.lists[0];
      }
      
      renderSidebar();
      await loadItems();
    }

    async function loadItems() {
      const { data: storedItems } = await Otzaria.call('storage.get', { key: `items_${state.currentList}` });
      state.items = storedItems || [];
      renderMain();
    }

    // --- Rendering ---
    function renderSidebar() {
      const nav = document.getElementById('nav-list');
      nav.innerHTML = state.lists.map(name => `
        <div class="nav-item ${name === state.currentList ? 'active' : ''}" onclick="switchList('${name}')">
          <span style="flex:1">${name}</span>
          <div class="nav-item-actions">
            <button class="icon-btn" onclick="event.stopPropagation(); openRenameListModal('${name}')" title="שנה שם">${ICON_EDIT}</button>
            <button class="icon-btn danger" onclick="event.stopPropagation(); confirmDeleteList('${name}')" title="מחק">${ICON_DEL}</button>
          </div>
        </div>
      `).join('');
    }

    function renderMain() {
      const container = document.getElementById('content-list');
      if (state.items.length === 0) {
        container.innerHTML = `<div class="empty-state">הרשימה "${state.currentList}" ריקה</div>`;
        return;
      }

      let itemCounter = 1; // מונה שמתעלם מהחוצצים וממספר רק את מראי המקומות

      container.innerHTML = state.items.map((item, i) => {
        // אם זה חוצץ
        if (item.isSeparator) {
          return `
            <div class="separator">
              <span class="separator-title">${item.title}</span>
              <div class="card-actions" style="margin:0;">
                <button class="icon-btn" onclick="moveItem(${i}, -1)" title="העבר למעלה" ${i === 0 ? 'disabled style="opacity:0.2"' : ''}>${ICON_UP}</button>
                <button class="icon-btn" onclick="moveItem(${i}, 1)" title="העבר למטה" ${i === state.items.length - 1 ? 'disabled style="opacity:0.2"' : ''}>${ICON_DOWN}</button>
                <button class="icon-btn danger" onclick="removeItem('${item.id}')" title="מחק חוצץ">${ICON_DEL}</button>
              </div>
            </div>
          `;
        }
        
        // אם זה פריט רגיל
        const html = `
          <div class="card">
            <div class="card-header">
              <div class="book-info">
                <span class="book-name">${itemCounter}. ${item.bookName}</span>
                <span class="book-ref">${item.ref}</span>
              </div>
            </div>
            <div class="card-text">${item.text}</div>
            <div class="card-actions">
              <button class="icon-btn" onclick="moveItem(${i}, -1)" title="העבר למעלה" ${i === 0 ? 'disabled style="opacity:0.2"' : ''}>${ICON_UP}</button>
              <button class="icon-btn" onclick="moveItem(${i}, 1)" title="העבר למטה" ${i === state.items.length - 1 ? 'disabled style="opacity:0.2"' : ''}>${ICON_DOWN}</button>
              <button class="icon-btn" onclick="goTo('${item.bookId}', ${item.index})" title="פתח באוצריא">${ICON_FOLDER}</button>
              <button class="icon-btn danger" onclick="removeItem('${item.id}', '${item.bookId}', ${item.index})" title="מחק פריט">${ICON_DEL}</button>
            </div>
          </div>
        `;
        itemCounter++;
        return html;
      }).join('');
    }

    // --- Actions ---
    window.switchList = async (name) => {
      state.currentList = name;
      localStorage.setItem('activeBookmarkList', name);
      renderSidebar();
      await loadItems();
    };

    window.openAddListModal = () => {
      openModal("רשימה חדשה", `<input id="modal-in" class="modal-input" placeholder="הכנס שם...">`, async () => {
        const val = document.getElementById('modal-in').value.trim();
        if (val && !state.lists.includes(val)) {
          state.lists.push(val);
          await Otzaria.call('storage.set', { key: 'plugin_lists', value: state.lists });
          await switchList(val);
        }
      });
    };

    window.openAddSeparatorModal = () => {
      openModal("הוספת חוצץ", `<input id="modal-in" class="modal-input" placeholder="שם החוצץ (למשל: פרק א')...">`, async () => {
        const val = document.getElementById('modal-in').value.trim();
        if (val) {
          state.items.push({
            id: Date.now(),
            isSeparator: true,
            title: val
          });
          await Otzaria.call('storage.set', { key: `items_${state.currentList}`, value: state.items });
          renderMain();
        }
      });
    };

    window.openRenameListModal = (oldName) => {
      openModal("שנה שם רשימה", `<input id="modal-in" class="modal-input" value="${oldName}">`, async () => {
        const newName = document.getElementById('modal-in').value.trim();
        if (newName && newName !== oldName && !state.lists.includes(newName)) {
          const idx = state.lists.indexOf(oldName);
          state.lists[idx] = newName;
          await Otzaria.call('storage.set', { key: 'plugin_lists', value: state.lists });
          
          const { data: oldItems } = await Otzaria.call('storage.get', { key: `items_${oldName}` });
          await Otzaria.call('storage.set', { key: `items_${newName}`, value: oldItems || [] });
          await Otzaria.call('storage.set', { key: `items_${oldName}`, value: null });
          
          if (state.currentList === oldName) {
            state.currentList = newName;
            localStorage.setItem('activeBookmarkList', newName);
          }
          renderSidebar();
          await loadItems();
        }
      });
    };

    window.confirmDeleteList = (name) => {
      openModal("מחיקת רשימה", `<p>האם למחוק את הרשימה "${name}" ואת כל הפריטים שבה?</p>`, async () => {
        state.lists = state.lists.filter(l => l !== name);
        if (state.lists.length === 0) state.lists = ['כללי']; 
        
        await Otzaria.call('storage.set', { key: 'plugin_lists', value: state.lists });
        await Otzaria.call('storage.set', { key: `items_${name}`, value: null });
        
        if (state.currentList === name) {
          await switchList(state.lists[0]);
        } else {
          renderSidebar();
        }
      });
    };

    window.moveItem = async (index, dir) => {
      const target = index + dir;
      if (target >= 0 && target < state.items.length) {
        [state.items[index], state.items[target]] = [state.items[target], state.items[index]];
        await Otzaria.call('storage.set', { key: `items_${state.currentList}`, value: state.items });
        renderMain();
      }
    };

    window.removeItem = async (id, bookId, index) => {
      state.items = state.items.filter(i => String(i.id) !== String(id));
      await Otzaria.call('storage.set', { key: `items_${state.currentList}`, value: state.items });
      
      // הסרת הדגשה רק אם זה מראה מקום ולא חוצץ
      if (bookId) {
        await Otzaria.call('reader.clearHighlight', { bookId, index });
      }
      
      renderMain();
    };

    window.goTo = async (bookId, index) => {
      await Otzaria.call('reader.openBook', { bookId: String(bookId), index: Number(index) });
    };

    window.exportToClipboard = async () => {
      if (state.items.length === 0) {
        Otzaria.call('ui.showSuccess', { message: 'הרשימה ריקה' });
        return;
      }
      
      let itemCounter = 1;
      const textParts = state.items.map(i => {
        if (i.isSeparator) {
          return `\n=== ${i.title} ===\n`;
        } else {
          const txt = `${itemCounter}. ${i.bookName} (${i.ref}):\n${i.text}`;
          itemCounter++;
          return txt;
        }
      });

      await navigator.clipboard.writeText(`רשימה: ${state.currentList}\n\n` + textParts.join('\n\n'));
      Otzaria.call('ui.showSuccess', { message: 'הרשימה הועתקה ללוח בהצלחה' });
    };

    window.toggleReadable = () => {
      state.isReadable = !state.isReadable;
      const cl = document.getElementById('content-list');
      const btn = document.getElementById('btn-readable');
      
      if (state.isReadable) {
        cl.classList.add('readable-design');
        btn.classList.remove('active');
      } else {
        cl.classList.remove('readable-design');
        btn.classList.add('active');
      }
    };

    // --- Event Listener: Save from Reader ---
    Otzaria.on('reader.context_menu_item_clicked', async (data) => {
      if (data.itemId === 'add-to-bookmarks-manager' && data.selectedText && data.currentBookId) {
        
        const newItem = {
          id: Date.now(),
          text: String(data.selectedText),
          ref: String(data.currentRef || 'ללא מיקום'),
          bookName: String(data.currentBook || data.currentBookId),
          bookId: String(data.currentBookId),
          index: Number(data.currentIndex || 0)
        };

        state.items.push(newItem);
        await Otzaria.call('storage.set', { key: `items_${state.currentList}`, value: state.items });

        await Otzaria.call('reader.setHighlight', {
          bookId: newItem.bookId,
          index: newItem.index,
          color: '#EADDFF',
          label: state.currentList
        });

        await Otzaria.call('ui.showSuccess', { message: `נשמר בהצלחה ב"${state.currentList}"` });
        renderMain(); 
      }
    });
  </script>
</body>
</html>
