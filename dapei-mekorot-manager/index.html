<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
   
    /* --- Material 3 Design Tokens --- */
    :root {
      --md-primary: #8C4A32;
      --md-on-primary: #FFFFFF;
      --md-surface: #FDF8F5;
      --md-on-surface: #201A18;
      --md-surface-variant: #F5EAE5;
      --md-outline: #85736C; /* צבע גבול דיפולטיבי */
      --md-error: #BA1A1A;
      /* --md-primary: #8C4A32;
      --md-on-primary: #FFFFFF;
      --md-surface: #FDFBFF;
      --md-on-surface: #1A1C1E;
      --md-surface-container: #F3F3F7; */
      --md-secondary-container: #D1E4FF;
      --md-on-secondary-container: #001D36;
      /* --md-outline: #74777F;
      --md-error: #BA1A1A; */
      --md-font: system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      font-family: var(--md-font); background: var(--md-surface); color: var(--md-on-surface);
      margin: 0; display: flex; height: 100vh; overflow: hidden; direction: rtl;
    }

    /* Sidebar Area */
    .sidebar {
      width: 280px; background: var(--md-surface-container);
      border-left: 1px solid var(--md-outline); display: flex; flex-direction: column;
    }
    .sidebar-header { padding: 16px; display: flex; justify-content: space-between; align-items: center; }
    .nav-list { flex: 1; overflow-y: auto; padding: 0 12px; }
    .nav-item {
      display: flex; align-items: center; justify-content: space-between;
      height: 50px; padding: 0 16px;
       border-radius: 20px;
        cursor: pointer;
         border: 1px solid var(--md-primary);
         margin-bottom: 6px;
    }
    .nav-item.active { background: var(--md-primary); color: var(--md-on-primary); font-weight: bold; }

    /* Main Area */
    .main { flex: 1; display: flex; flex-direction: column; padding: 24px; overflow-y: auto; }
    .toolbar { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }

    /* Material Buttons */
    .btn {
      display: inline-flex; align-items: center; gap: 8px; height: 40px; padding: 0 16px;
      border-radius: 20px; border: none; cursor: pointer; font-weight: 500; font-family: inherit;
    }
    .btn-filled { background: var(--md-primary); color: var(--md-on-primary); }
    .btn-outlined { background: transparent; border: 1px solid var(--md-outline); color: var(--md-primary); }
    
    .icon-btn {
      width: 36px; height: 36px; border-radius: 18px; border: none; background: transparent;
      display: flex; align-items: center; justify-content: center; cursor: pointer; color: inherit;
    }
    .icon-btn:hover { background: rgba(0,0,0,0.08); }
    .icon-btn svg { width: 20px; height: 20px; fill: currentColor; }

    /* List Cards */
    .item-card {
      background: var(--md-surface); border: 1px solid var(--md-outline);
      border-radius: 12px; padding: 12px 16px; margin-bottom: 8px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .item-info { flex: 1; cursor: pointer; }
    .item-title { font-weight: bold; color: var(--md-primary); }
    .item-sub { font-size: 0.85rem; opacity: 0.7; }
    .item-actions { display: flex; gap: 2px; }

    /* --- Material Dialog (Modal) --- */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: none; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal {
      background: var(--md-surface); width: 320px; padding: 24px; border-radius: 28px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .modal-title { font-size: 1.5rem; margin-bottom: 16px; }
    .modal-input {
      width: 100%; padding: 12px; border: 1px solid var(--md-outline);
      border-radius: 8px; margin-bottom: 24px; font-family: inherit;
    }
    .modal-btns { display: flex; justify-content: flex-end; gap: 8px; }

  </style>
</head>
<body>

  <div class="sidebar">
    <div class="sidebar-header">
      <span style="font-weight: bold;">דפי המקורות</span>
      <button class="icon-btn" onclick="openNewListModal()">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      </button>
    </div>
    <div class="nav-list" id="nav-list"></div>
  </div>

  <div class="main">
    <div class="toolbar">
      <button class="btn btn-filled" onclick="fetchTabs()"> טען טאבים פתוחים</button>
      <button class="btn btn-outlined" onclick="openAll()"> פתח הכל</button>
      <button class="btn btn-outlined" onclick="exportList()"> העתקה ללוח</button>
    </div>
    <div id="content-list"></div>
  </div>

  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <div id="modal-title" class="modal-title"></div>
      <div id="modal-content"></div>
      <div class="modal-btns">
        <button class="btn btn-outlined" onclick="closeModal()">ביטול</button>
        <button class="btn btn-filled" id="modal-confirm-btn">אישור</button>
      </div>
    </div>
  </div>

  <script>
    // --- Icons ---
    const ICON_DEL = `<svg viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>`;
    const ICON_UP = `<svg viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>`;
    const ICON_DOWN = `<svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>`;

    let state = { current: "כללי", lists: { "כללי": [] } };

    // --- Boot & Persistence ---
    Otzaria.on('plugin.boot', async (p) => {
      if (p.theme) applyTheme(p.theme);
      const res = await Otzaria.call('storage.get', { key: 'bookmarks_v4' });
      if (res.success && res.data) state = res.data;
      render();
    });

    async function save() {
      await Otzaria.call('storage.set', { key: 'bookmarks_v4', value: state });
    }

    function applyTheme(t) {
      const r = document.documentElement;
      r.style.setProperty('--md-primary', t.colorScheme.primary);
      r.style.setProperty('--md-on-primary', t.colorScheme.onPrimary);
      r.style.setProperty('--md-surface', t.colorScheme.surface);
    }

    // --- Dialog System (Material) ---
    function openModal(title, html, onConfirm) {
      const overlay = document.getElementById('modal-overlay');
      document.getElementById('modal-title').innerText = title;
      document.getElementById('modal-content').innerHTML = html;
      document.getElementById('modal-confirm-btn').onclick = () => { onConfirm(); closeModal(); };
      overlay.style.display = 'flex';
    }
    function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }

    // --- Business Logic ---
    window.openNewListModal = () => {
      openModal("רשימה חדשה", `<input id="list-name-in" class="modal-input" placeholder="שם הרשימה...">`, () => {
        const val = document.getElementById('list-name-in').value.trim();
        if (val && !state.lists[val]) {
          state.lists[val] = []; state.current = val; save().then(render);
        }
      });
    };

    window.confirmDeleteList = (name) => {
      openModal("מחיקת רשימה", `<p>האם למחוק את הרשימה "${name}"?</p>`, () => {
        delete state.lists[name];
        state.current = Object.keys(state.lists)[0] || "כללי";
        if (!state.lists[state.current]) state.lists["כללי"] = [];
        save().then(render);
      });
    };

    window.fetchTabs = async () => {
      const res = await Otzaria.call('reader.getCurrentState');
      if (res.success && res.data.openTabs) {
        res.data.openTabs.forEach(t => {
          if (!state.lists[state.current].find(i => i.bookId === t.bookId && i.index === t.index)) {
            state.lists[state.current].push({ book: t.book, title: t.title || "מיקום", bookId: t.bookId, index: t.index });
          }
        });
        save().then(render);
      }
    };

    window.move = async (idx, dir) => {
      const list = state.lists[state.current];
      const target = idx + dir;
      if (target >= 0 && target < list.length) {
        [list[idx], list[target]] = [list[target], list[idx]];
        await save(); render();
      }
    };

    window.exportList = () => {
      const txt = state.lists[state.current].map(i => `${i.index+1}. ${i.book}`).join('\n');
      navigator.clipboard.writeText(txt);
      Otzaria.call('ui.showSuccess', { message: 'הרשימה הועתקה ללוח' });
    };

    window.openAll = async () => {
      for (const i of state.lists[state.current]) {
        await Otzaria.call('reader.openBook', { bookId: i.bookId, index: i.index });
      }
    };

    // --- Rendering ---
    function render() {
      // Sidebar
      const nav = document.getElementById('nav-list');
      nav.innerHTML = Object.keys(state.lists).map(name => `
        <div class="nav-item ${name === state.current ? 'active' : ''}" onclick="state.current='${name}'; render();">
          <span style="flex:1">${name}</span>
          <button class="icon-btn" onclick="event.stopPropagation(); confirmDeleteList('${name}')">${ICON_DEL}</button>
        </div>
      `).join('');

      // Main Content
      const content = document.getElementById('content-list');
      const items = state.lists[state.current] || [];
      content.innerHTML = items.map((item, i) => `
        <div class="item-card">
          <div class="item-info" onclick="Otzaria.call('reader.openBook', {bookId:'${item.bookId}', index:${item.index}})">
            <div class="item-title">${i+1}. ${item.book}</div>
          </div>
          <div class="item-actions">
            <button class="icon-btn" onclick="move(${i}, -1)">${ICON_UP}</button>
            <button class="icon-btn" onclick="move(${i}, 1)">${ICON_DOWN}</button>
            <button class="icon-btn" style="color:var(--md-error)" onclick="state.lists[state.current].splice(${i},1); save(); render();">${ICON_DEL}</button>
          </div>
        </div>
      `).join(items.length ? '' : '<div style="text-align:center; opacity:0.5; margin-top:50px;">הרשימה ריקה</div>');
    }
  </script>
</body>
</html>
