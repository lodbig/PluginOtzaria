<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>שעון נוכחות</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --color-primary:                   #6750A4;
  --color-on-primary:                #FFFFFF;
  --color-secondary:                 #625B71;
  --color-on-secondary:              #FFFFFF;
  --color-surface:                   #FFFBFE;
  --color-on-surface:                #1C1B1F;
  --color-surface-container-highest: #E6E0E9;
  --color-error:                     #B3261E;
  --color-on-error:                  #FFFFFF;
  --color-outline:                   #79747E;
  --color-primary-subtle:            rgba(103,80,164,0.12);
  --color-secondary-subtle:          rgba(98,91,113,0.12);
  --font-main:      'Frank Ruhl Libre', 'David', serif;
  --font-size-base: 18px;
  --line-height:    1.5;
  --radius-sm:   8px;
  --radius-md:  12px;
  --radius-lg:  16px;
  --radius-pill: 999px;
}

html, body { height: 100%; overflow: hidden; }
body {
  font-family: var(--font-main);
  font-size: var(--font-size-base);
  line-height: var(--line-height);
  background: var(--color-surface);
  color: var(--color-on-surface);
  direction: rtl;
  display: flex;
  flex-direction: column;
}

/* ══════════════ TAB BAR ══════════════ */
.tab-bar {
  display: flex; flex-shrink: 0;
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-outline); z-index: 20;
}
.tab-btn {
  flex: 1; padding: 11px 4px 9px;
  background: none; border: none; border-bottom: 3px solid transparent;
  font-family: var(--font-main); font-size: 0.78em;
  color: var(--color-on-surface); cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.tab-btn .ti { font-size: 1.25em; line-height: 1; }
.tab-btn.active { border-bottom-color: var(--color-primary); color: var(--color-primary); font-weight: 700; }
.tab-btn:hover:not(.active) { background: var(--color-secondary-subtle); }

/* ══════════════ LAYOUT ══════════════ */
.content { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
.tab-panel { display: none; flex: 1; overflow-y: auto; flex-direction: column; }
.tab-panel.active { display: flex; }

/* ══════════════ MAIN TAB ══════════════ */
#panel-main { padding: 0; }

.date-strip {
  flex-shrink: 0; padding: 10px 16px 8px;
  border-bottom: 1px solid var(--color-outline);
  display: flex; align-items: baseline; justify-content: space-between; gap: 8px;
}
.date-strip .ds-heb  { font-size: 0.92em; font-weight: 700; color: var(--color-primary); }
.date-strip .ds-greg { font-size: 0.72em; opacity: 0.6; }
.date-strip .ds-hol  { font-size: 0.72em; color: var(--color-secondary); font-weight: 700; }

/* Clock selector pills */
.clock-pills-wrap {
  flex-shrink: 0; padding: 12px 16px 0;
  display: flex; gap: 8px; flex-wrap: wrap;
}
.clock-pill {
  padding: 5px 16px; border-radius: var(--radius-pill);
  border: 1.5px solid var(--color-outline);
  background: none; font-family: var(--font-main); font-size: 0.82em;
  color: var(--color-on-surface); cursor: pointer; white-space: nowrap;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.clock-pill.selected {
  background: var(--color-primary); border-color: var(--color-primary);
  color: var(--color-on-primary); font-weight: 700;
}
.clock-pill:hover:not(.selected) { background: var(--color-primary-subtle); border-color: var(--color-primary); }

/* Stage */
.clock-stage {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 12px 24px 28px; gap: 0;
}
.stage-period {
  font-size: 0.72em; font-weight: 600;
  background: var(--color-secondary-subtle); color: var(--color-secondary);
  border-radius: var(--radius-pill); padding: 3px 14px; margin-bottom: 8px;
}
.stage-total {
  font-size: 0.88em; opacity: 0.75; margin-bottom: 26px; text-align: center;
}
.stage-total strong { color: var(--color-primary); font-size: 1.15em; }

/* FAB */
.fab {
  width: 116px; height: 116px; border-radius: 50%; border: none; cursor: pointer;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
  font-family: var(--font-main); font-weight: 700;
  box-shadow: 0 6px 24px rgba(0,0,0,0.2);
  transition: transform 0.12s, box-shadow 0.12s, opacity 0.15s;
  margin-bottom: 22px;
}
.fab:active { transform: scale(0.94); box-shadow: 0 3px 10px rgba(0,0,0,0.14); }
.fab-icon  { font-size: 2em; line-height: 1; }
.fab-label { font-size: 0.78em; letter-spacing: 0.02em; }
.fab-in  { background: var(--color-primary); color: var(--color-on-primary); }
.fab-in:hover  { opacity: 0.88; }
.fab-out { background: var(--color-error);   color: var(--color-on-error); }
.fab-out:hover { opacity: 0.88; }

/* Status block */
.stage-status { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 5px; width: 100%; }
.status-row   { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.85em; }
.sdot { width: 9px; height: 9px; border-radius: 50%; }
.sdot-in  { background: #1A7F4B; }
.sdot-out { background: var(--color-outline); }
.s-entry  { font-weight: 700; color: var(--color-primary); }
.s-elapsed { font-size: 1.08em; font-weight: 700; color: var(--color-primary); font-variant-numeric: tabular-nums; }
.s-elabel  { font-size: 0.75em; opacity: 0.6; }

/* Action chips */
.stage-chips { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
.chip-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 14px; border-radius: var(--radius-pill);
  border: 1px solid var(--color-outline);
  background: none; font-family: var(--font-main); font-size: 0.78em;
  color: var(--color-on-surface); cursor: pointer;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.chip-btn:hover { background: var(--color-primary-subtle); border-color: var(--color-primary); color: var(--color-primary); }

/* Last session box */
.last-box {
  width: 100%; margin-top: 16px;
  background: var(--color-primary-subtle);
  border: 1px solid var(--color-outline); border-radius: var(--radius-md);
  padding: 10px 14px; font-size: 0.8em;
}
.last-box .lb-title { font-weight: 700; color: var(--color-primary); margin-bottom: 5px; }
.last-box .lb-row { display: flex; gap: 14px; flex-wrap: wrap; opacity: 0.88; }
.last-box .lb-row span b { color: var(--color-primary); }
.last-box .lb-note { margin-top: 5px; opacity: 0.7; font-style: italic; }
.last-box .lb-actions { display: flex; gap: 6px; margin-top: 7px; }

.no-clocks { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; opacity: 0.55; padding: 32px; font-size: 0.88em; text-align: center; }

/* ══════════════ HISTORY TAB ══════════════ */
#panel-history { padding: 12px 12px 24px; }

.filter-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; align-items: center; }
.filter-bar select, .filter-bar input[type="date"] {
  background: var(--color-surface); border: 1px solid var(--color-outline);
  border-radius: var(--radius-sm); padding: 6px 10px;
  font-family: var(--font-main); font-size: 0.78em; color: var(--color-on-surface); flex: 1; min-width: 88px;
}
.filter-bar select:focus, .filter-bar input:focus { outline: 2px solid var(--color-primary); }
.hist-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
.total-banner { display: flex; align-items: center; justify-content: space-between; background: var(--color-primary-subtle); border-radius: var(--radius-sm); padding: 6px 12px; margin-bottom: 10px; font-size: 0.78em; }
.total-banner .tb-v { font-weight: 700; color: var(--color-primary); }

.tbl-wrap { overflow-x: auto; }
.htbl { width: 100%; border-collapse: collapse; font-size: 0.76em; }
.htbl thead tr { background: var(--color-primary-subtle); }
.htbl th { padding: 8px 9px; text-align: right; font-weight: 700; color: var(--color-primary); border-bottom: 2px solid var(--color-outline); white-space: nowrap; }
.htbl td { padding: 7px 9px; border-bottom: 1px solid var(--color-outline); vertical-align: middle; }
.htbl tr:last-child td { border-bottom: none; }
.htbl tr:hover td { background: var(--color-secondary-subtle); }
.htbl tr.gift-row td { background: var(--color-primary-subtle); }
.htbl tr.gift-row:hover td { background: color-mix(in srgb, var(--color-primary) 18%, transparent); }
.htbl .act-cell { display: flex; gap: 4px; white-space: nowrap; }
.htbl .note-td { max-width: 110px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; opacity: 0.7; font-style: italic; }
.empty-state { text-align: center; opacity: 0.5; padding: 32px 16px; font-size: 0.88em; }

/* ══════════════ SETTINGS TAB ══════════════ */
#panel-settings { padding: 12px 12px 24px; }
.sec-title { font-size: 0.72em; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; opacity: 0.5; margin: 14px 0 8px; }
.clock-item { display: flex; align-items: center; background: var(--color-surface); border: 1px solid var(--color-outline); border-radius: var(--radius-md); padding: 10px 14px; margin-bottom: 8px; }
.ci-info { flex: 1; }
.ci-name { font-weight: 700; font-size: 0.92em; }
.ci-meta { font-size: 0.72em; opacity: 0.6; margin-top: 2px; }
.ci-actions { display: flex; gap: 6px; }
.reminder-box { background: var(--color-surface); border: 1px solid var(--color-outline); border-radius: var(--radius-md); padding: 14px 16px; margin-bottom: 8px; }
.rem-title { font-weight: 700; font-size: 0.88em; margin-bottom: 8px; color: var(--color-primary); }

/* ══════════════ OVERLAY ══════════════ */
.ov-scrim { position: fixed; inset: 0; background: rgba(0,0,0,0.32); opacity: 0; pointer-events: none; transition: opacity 0.2s; z-index: 100; }
.ov-scrim.open { opacity: 1; pointer-events: auto; }
.ov-panel {
  position: fixed; top: 10px; bottom: 12px; right: 10px;
  width: min(390px, calc(100vw - 20px));
  background: color-mix(in srgb, var(--color-secondary) 12%, var(--color-surface));
  border-radius: 18px; box-shadow: 0 8px 28px rgba(0,0,0,0.2);
  padding: 20px; overflow-y: auto; z-index: 101;
  opacity: 0; transform: translateX(30px); pointer-events: none;
  transition: opacity 0.22s, transform 0.26s cubic-bezier(0.4,0,0.2,1);
}
.ov-panel.open { opacity: 1; transform: translateX(0); pointer-events: auto; }
.ov-title { font-size: 1.02em; font-weight: 700; color: var(--color-primary); margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
.ov-close { background: none; border: none; font-size: 1.25em; cursor: pointer; color: var(--color-on-surface); opacity: 0.55; padding: 2px 6px; border-radius: var(--radius-sm); }
.ov-close:hover { background: var(--color-secondary-subtle); opacity: 1; }

/* Forms */
.fg { margin-bottom: 13px; }
.fl { display: block; font-size: 0.8em; font-weight: 700; margin-bottom: 5px; opacity: 0.8; }
.fi, .fsel, .fta {
  width: 100%; background: var(--color-surface); border: 1.5px solid var(--color-outline);
  border-radius: var(--radius-sm); padding: 9px 12px;
  font-family: var(--font-main); font-size: 0.88em; color: var(--color-on-surface);
  transition: border-color 0.15s;
}
.fi:focus,.fsel:focus,.fta:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 2px var(--color-primary-subtle); }
.fta { resize: vertical; min-height: 68px; }
.fr { display: flex; gap: 10px; }
.fr .fg { flex: 1; min-width: 0; }
.radio-group { display: flex; flex-direction: column; gap: 5px; }
.radio-opt {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border: 1px solid var(--color-outline);
  border-radius: var(--radius-sm); cursor: pointer; font-size: 0.82em;
  transition: background 0.15s;
}
.radio-opt input[type="radio"] { accent-color: var(--color-primary); cursor: pointer; flex-shrink: 0; }
.radio-opt:has(input:checked) { background: var(--color-primary-subtle); border-color: var(--color-primary); color: var(--color-primary); font-weight: 700; }
.radio-opt:hover:not(:has(input:checked)) { background: var(--color-secondary-subtle); }

/* Buttons */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 5px; padding: 8px 18px; border: none; border-radius: var(--radius-sm); font-family: var(--font-main); font-size: 0.88em; font-weight: 700; cursor: pointer; transition: opacity 0.15s, transform 0.1s; white-space: nowrap; }
.btn:active { transform: scale(0.97); }
.btn-primary   { background: var(--color-primary); color: var(--color-on-primary); }
.btn-primary:hover { opacity: 0.88; }
.btn-secondary { background: var(--color-secondary-subtle); color: var(--color-on-surface); border: 1px solid var(--color-outline); }
.btn-secondary:hover { opacity: 0.82; }
.btn-danger    { background: rgba(179,38,30,.1); color: var(--color-error); border: 1px solid var(--color-error); }
.btn-danger:hover { opacity: 0.82; }
.btn-ghost { background: none; color: var(--color-primary); padding: 6px 12px; }
.btn-ghost:hover { background: var(--color-primary-subtle); }
.btn-sm { padding: 5px 12px; font-size: 0.78em; border-radius: var(--radius-pill); }
.btn-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
.divider { border: none; border-top: 1px solid var(--color-outline); margin: 13px 0; }

.spinner { width: 28px; height: 28px; border: 3px solid var(--color-outline); border-top-color: var(--color-primary); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 40px auto; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
.fade-in { animation: fadeIn 0.18s ease-out; }

body.dark-mode .clock-item, body.dark-mode .reminder-box { box-shadow: 0 1px 4px rgba(0,0,0,0.35); }
body.dark-mode .ov-panel { box-shadow: 0 8px 28px rgba(0,0,0,0.5); }
</style>
</head>
<body>

<nav class="tab-bar">
  <button class="tab-btn active" id="tab-main"     onclick="switchTab('main')"    ><span class="ti">🕐</span>רישום</button>
  <button class="tab-btn"        id="tab-history"  onclick="switchTab('history')" ><span class="ti">📋</span>היסטוריה</button>
  <button class="tab-btn"        id="tab-settings" onclick="switchTab('settings')"><span class="ti">⚙️</span>הגדרות</button>
</nav>

<div class="content">

  <!-- ═══ MAIN ═══ -->
  <div class="tab-panel active" id="panel-main">
    <div class="date-strip" id="date-strip"></div>
    <div class="clock-pills-wrap" id="clock-pills"></div>
    <div class="clock-stage" id="clock-stage"><div class="spinner"></div></div>
  </div>

  <!-- ═══ HISTORY ═══ -->
  <div class="tab-panel" id="panel-history">
    <div class="filter-bar">
      <select id="hf-clock" onchange="renderHistory()"><option value="">כל השעונים</option></select>
      <input type="date" id="hf-from" onchange="renderHistory()" title="מתאריך" />
      <input type="date" id="hf-to"   onchange="renderHistory()" title="עד תאריך" />
    </div>
    <div class="hist-actions">
      <button class="btn btn-primary btn-sm"   onclick="openAddRecord()">＋ רישום ידני</button>
      <button class="btn btn-secondary btn-sm" onclick="openGiftDialog()">🎁 שעות מתנה</button>
      <button class="btn btn-ghost btn-sm"     onclick="exportCSV()">⬇ CSV</button>
    </div>
    <div id="hist-banner"></div>
    <div class="tbl-wrap" id="hist-tbl"></div>
  </div>

  <!-- ═══ SETTINGS ═══ -->
  <div class="tab-panel" id="panel-settings">
    <div class="sec-title">שעונים</div>
    <div style="margin-bottom:10px;"><button class="btn btn-primary btn-sm" onclick="openClockEditor()">＋ הוסף שעון</button></div>
    <div id="clocks-list"></div>

    <div class="sec-title">תזמון התראה</div>
    <div class="reminder-box">
      <div class="rem-title">🔔 תזמן תזכורת לסיום</div>
      <p style="font-size:0.78em;opacity:0.7;margin-bottom:10px;">
        שלח התראה למערכת ההפעלה אחרי הזמן שתבחר — כדי לדעת לרשום יציאה.
      </p>
      <div class="fr" style="margin-bottom:10px;">
        <div class="fg"><label class="fl">שעות</label><input id="rem-h" class="fi" type="number" min="0" max="12" value="1" /></div>
        <div class="fg"><label class="fl">דקות</label><input id="rem-m" class="fi" type="number" min="0" max="59" step="5" value="30" /></div>
      </div>
      <div class="fg" style="margin-bottom:10px;"><label class="fl">כותרת</label><input id="rem-ti" class="fi" type="text" value="⏰ תזכורת סיום לימוד" /></div>
      <div class="btn-row">
        <button class="btn btn-primary btn-sm"   onclick="scheduleRemNow()">🔔 תזמן</button>
        <button class="btn btn-ghost btn-sm"     onclick="cancelAllRem()">🔕 בטל הכל</button>
      </div>
      <div id="rem-status" style="font-size:0.75em;margin-top:8px;color:var(--color-secondary);min-height:1.2em;"></div>
    </div>
  </div>

</div>

<!-- OVERLAY -->
<div class="ov-scrim" id="ov-scrim" onclick="closeOv()"></div>
<div class="ov-panel" id="ov-panel"><div id="ov-body"></div></div>

<script>
// ─────────────────────────────────────────────
//  HEBREW HELPERS
// ─────────────────────────────────────────────
const HV=[[400,'ת'],[300,'ש'],[200,'ר'],[100,'ק'],[90,'צ'],[80,'פ'],[70,'ע'],[60,'ס'],[50,'נ'],[40,'מ'],[30,'ל'],[20,'כ'],[10,'י'],[9,'ט'],[8,'ח'],[7,'ז'],[6,'ו'],[5,'ה'],[4,'ד'],[3,'ג'],[2,'ב'],[1,'א']];
function hNum(n){if(n===15)return'ט"ו';if(n===16)return'ט"ז';let r='',rem=n;for(const[v,c]of HV)while(rem>=v){r+=c;rem-=v;}return r.length===1?r+"'":r.slice(0,-1)+'"'+r.slice(-1);}
function hYear(y){return hNum(y%1000);}
const DAY_H=['ראשון','שני','שלישי','רביעי','חמישי','שישי','שבת'];
const MON_H=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];

// ─────────────────────────────────────────────
//  TIME UTILS
// ─────────────────────────────────────────────
const pad=n=>String(n).padStart(2,'0');
const nowHM=()=>{const d=new Date();return pad(d.getHours())+':'+pad(d.getMinutes());};
const todayISO=()=>{const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());};
const hm2min=s=>{if(!s)return 0;const[h,m]=s.split(':').map(Number);return h*60+m;};
const min2hm=t=>{if(t<0)t=0;return Math.floor(t/60)+':'+pad(t%60);};
function durLbl(m){const h=Math.floor(m/60),mm=m%60;if(!h)return mm+"ד'";if(!mm)return h+"ש'";return h+"ש' "+mm+"ד'";}
function calcDur(a,b){const d=hm2min(b)-hm2min(a);return d>=0?d:d+1440;}
const elapsed=ts=>min2hm(Math.floor((Date.now()-ts)/60000));

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
const S={
  clocks:[],   // {id,name,dateDisplay,cycleType,customStart,customEnd}
  records:[],  // {id,clockId,type,date,hebrewYear,hebrewMonth,hebrewDay,hebrewMonthName,hebrewDayStr,entryTime,exitTime,durationMin,giftMinutes,notes}
  sessions:{}, // {[clockId]:{entryTime,entryTimestamp,pendingNote}}
  today:todayISO(),
  heb:null,    // from calendar.getJewishDate
  selClock:null,
};

// ─────────────────────────────────────────────
//  STORAGE
// ─────────────────────────────────────────────
async function load(){
  try{
    const a=await Otzaria.call('storage.get',{key:'attn_clocks'});   if(a.success&&a.data)S.clocks=a.data;
    const b=await Otzaria.call('storage.get',{key:'attn_records'});  if(b.success&&b.data)S.records=b.data;
    const c=await Otzaria.call('storage.get',{key:'attn_sessions'}); if(c.success&&c.data)S.sessions=c.data;
  }catch(e){console.warn(e);}
}
const saveC=()=>Otzaria.call('storage.set',{key:'attn_clocks',   value:S.clocks});
const saveR=()=>Otzaria.call('storage.set',{key:'attn_records',  value:S.records});
const saveSS=()=>Otzaria.call('storage.set',{key:'attn_sessions',value:S.sessions});

// ─────────────────────────────────────────────
//  PERIOD HELPERS
// ─────────────────────────────────────────────
function inPeriod(rec,clock){
  if(!rec||!clock)return false;
  if(clock.cycleType==='gregorian-month')return rec.date&&rec.date.startsWith(S.today.slice(0,7));
  if(clock.cycleType==='hebrew-month'){
    if(!S.heb)return rec.date&&rec.date.startsWith(S.today.slice(0,7));
    return rec.hebrewYear===S.heb.year&&rec.hebrewMonth===S.heb.month;
  }
  if(clock.cycleType==='custom'){
    const ss=clock.customStart||'',ee=clock.customEnd||'';
    return(!ss||rec.date>=ss)&&(!ee||rec.date<=ee);
  }
  return true;
}
function periodTotal(cid){
  const cl=S.clocks.find(c=>c.id===cid);
  return S.records.filter(r=>r.clockId===cid&&inPeriod(r,cl)).reduce((s,r)=>s+(r.durationMin||0)+(r.giftMinutes||0),0);
}
function periodLabel(cl){
  if(!cl)return'';
  if(cl.cycleType==='gregorian-month'){const d=new Date(S.today+'T00:00:00');return MON_H[d.getMonth()]+' '+d.getFullYear();}
  if(cl.cycleType==='hebrew-month')return S.heb?S.heb.monthName+' '+hYear(S.heb.year):'חודש נוכחי';
  if(cl.cycleType==='custom'){
    const s=cl.customStart||'?',e=cl.customEnd||'?';
    return(s!='?'?s.split('-').reverse().join('/'):'?')+' – '+(e!='?'?e.split('-').reverse().join('/'):'?');
  }
  return'';
}

async function checkIn(cid){
  if(S.sessions[cid])return;
  S.sessions[cid]={entryTime:nowHM(),entryTimestamp:Date.now(),pendingNote:''};
  await saveSS(); renderMain();
  openReminderPopup(cid);
}
async function checkOut(cid){
  const sess=S.sessions[cid];if(!sess)return;
  const exit=nowHM(),dur=calcDur(sess.entryTime,exit);
  const h=S.heb,d=new Date();
  S.records.push({
    id:uid('rec'),clockId:cid,type:'session',date:S.today,
    hebrewYear:h?.year??null,hebrewMonth:h?.month??null,hebrewDay:h?.day??null,
    hebrewMonthName:h?.monthName??null,hebrewDayStr:DAY_H[d.getDay()===6?6:d.getDay()],
    entryTime:sess.entryTime,exitTime:exit,durationMin:dur,giftMinutes:0,notes:sess.pendingNote||''
  });
  delete S.sessions[cid];
  await saveR();await saveSS();renderMain();
}
const uid=p=>p+'_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);

  document.getElementById('date-strip').innerHTML=`

async function _schedRem(h,m,title){
  const ms=(h*60+m)*60000;if(ms<=0){alert('נא להזין זמן גדול מאפס');return;}
  const at=new Date(Date.now()+ms);
  try{
    await Otzaria.call('notifications.requestPermissions');
    await Otzaria.call('notifications.scheduleSystem',{
      title,body:`הגיע הזמן לסיים — ${pad(at.getHours())}:${pad(at.getMinutes())}`,
      scheduledTime:at.toISOString()
    });
    const st=document.getElementById('rem-status');
    if(st)st.textContent=`✅ תישלח בשעה ${pad(at.getHours())}:${pad(at.getMinutes())}`;
    await Otzaria.call('notifications.showInApp',{message:'🔔 התראה תוזמנה',type:'success'});
  }catch(e){console.warn(e);const st=document.getElementById('rem-status');if(st)st.textContent='❌ שגיאה בתזמון';}
}
function scheduleRemNow(){
  _schedRem(
    parseInt(document.getElementById('rem-h').value||'1',10),
    parseInt(document.getElementById('rem-m').value||'30',10),
    document.getElementById('rem-ti').value||'⏰ תזכורת'
  );
}
async function cancelAllRem(){
  try{
    await Otzaria.call('notifications.cancelAll');
    const st=document.getElementById('rem-status');if(st)st.textContent='🔕 ההתראות בוטלו';
    await Otzaria.call('notifications.showInApp',{message:'ההתראות בוטלו',type:'info'});
  }catch(e){console.warn(e);}
}

function renderHistory(){

  }
  const fc=document.getElementById('hf-clock')?.value||'';
  const ff=document.getElementById('hf-from')?.value||'';
  const ft=document.getElementById('hf-to')?.value||'';

  let recs=[...S.records].sort((a,b)=>((b.date||'')+(b.entryTime||'')).localeCompare((a.date||'')+(a.entryTime||'')));
  if(fc)recs=recs.filter(r=>r.clockId===fc);
  if(ff)recs=recs.filter(r=>r.date>=ff);
  if(ft)recs=recs.filter(r=>r.date<=ft);

  const tot=recs.reduce((s,r)=>s+(r.durationMin||0)+(r.giftMinutes||0),0);
  const bannerEl=document.getElementById('hist-banner');
  if(bannerEl)bannerEl.innerHTML=recs.length?`
    <div class="total-banner">

  const tblEl=document.getElementById('hist-tbl');if(!tblEl)return;
  if(!recs.length){tblEl.innerHTML='<div class="empty-state">אין רישומים בסינון הנבחר.</div>';return;}

  const rows=recs.map(r=>{
    const cl=S.clocks.find(c=>c.id===r.clockId);
    const cName=cl?cl.name:r.clockId;
    const greg=r.date?r.date.split('-').reverse().join('/'):'';
    const hd=(r.hebrewDay&&r.hebrewMonthName)
      ?hNum(r.hebrewDay)+' '+r.hebrewMonthName+(r.hebrewYear?' '+hYear(r.hebrewYear):'')
      :'';

    if(r.type==='gift'){
      return `<tr class="gift-row fade-in">
        <td>🎁 ${greg}</td><td>${hd||'—'}</td><td>${esc(cName)}</td>
        <td>—</td><td>—</td>
        <td colspan="2" style="font-weight:700;color:var(--color-primary)">${durLbl(r.giftMinutes||0)}</td>
        <td class="note-td" title="${esc(r.notes||'')}">${esc(r.notes||'—')}</td>
        <td><div class="act-cell">
          <button class="btn btn-secondary btn-sm" onclick="openEditRec('${r.id}')">✏️</button>
          <button class="btn btn-danger btn-sm"    onclick="delRec('${r.id}')">🗑</button>
        </div></td>
      </tr>`;
    }

    const giftStr=r.giftMinutes?` <span style="color:var(--color-primary);font-size:.85em">+${durLbl(r.giftMinutes)}</span>`:'';
    const totRec=(r.durationMin||0)+(r.giftMinutes||0);
    return `<tr class="fade-in">
      <td>${greg}</td><td>${hd||'—'}</td><td>${esc(cName)}</td>
      <td>${r.entryTime||'—'}</td><td>${r.exitTime||'—'}</td>
      <td>${r.exitTime?durLbl(r.durationMin||0):'—'}${giftStr}</td>
      <td><strong>${r.exitTime?durLbl(totRec):'—'}</strong></td>
      <td class="note-td" title="${esc(r.notes||'')}">${esc(r.notes||'—')}</td>
      <td><div class="act-cell">
        <button class="btn btn-secondary btn-sm" onclick="openEditRec('${r.id}')">✏️</button>
        <button class="btn btn-ghost btn-sm"     onclick="openNoteRec('${r.id}')">📝</button>
        <button class="btn btn-danger btn-sm"    onclick="delRec('${r.id}')">🗑</button>
      </div></td>
    </tr>`;
  }).join('');

  tblEl.innerHTML=`<table class="htbl">
    <thead><tr>
      <th>תאריך</th><th>ת׳ עברי</th><th>שעון</th>
      <th>כניסה</th><th>יציאה</th><th>משך</th><th>סה"כ</th>
      <th>הערה</th><th></th>
    </tr></thead><tbody>${rows}</tbody>
  </table>`;
}

  S.clocks=S.clocks.filter(c=>c.id!==id);
  if(S.selClock===id)S.selClock=null;
  await saveC();renderSettings();renderMain();
}

  const ex=document.getElementById('er-ex')?.value||'';
  const gh=parseInt(document.getElementById('er-gh')?.value||'0',10);
  const gm=parseInt(document.getElementById('er-gm')?.value||'0',10);
  const no=document.getElementById('er-no')?.value||'';
  const gift=gh*60+gm;
  const idx=S.records.findIndex(r=>r.id===id);if(idx<0)return;
  const r=S.records[idx];
  if(r.type==='gift'){S.records[idx]={...r,clockId:cid,date:d,giftMinutes:gift,notes:no};}
  else{const dur=(en&&ex)?calcDur(en,ex):0;S.records[idx]={...r,clockId:cid,date:d,entryTime:en,exitTime:ex,durationMin:dur,giftMinutes:gift,notes:no};}
  await saveR();closeOv();renderHistory();renderMain();
  await Otzaria.call('notifications.showInApp',{message:'✅ עודכן',type:'success'});
}

// ─────────────────────────────────────────────
//  EXPORT CSV
// ─────────────────────────────────────────────
function exportCSV(){
  const fc=document.getElementById('hf-clock')?.value||'';
  const ff=document.getElementById('hf-from')?.value||'';
  const ft=document.getElementById('hf-to')?.value||'';
  let recs=[...S.records].sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  if(fc)recs=recs.filter(r=>r.clockId===fc);
  if(ff)recs=recs.filter(r=>r.date>=ff);
  if(ft)recs=recs.filter(r=>r.date<=ft);
  const hdr=['שעון','תאריך','ת׳ עברי','יום','כניסה','יציאה','משך (דק)','מתנה (דק)','סה"כ (דק)','הערה','סוג'];
  const rows=recs.map(r=>{
    const cl=S.clocks.find(c=>c.id===r.clockId);
    const hd=(r.hebrewDay&&r.hebrewMonthName)?hNum(r.hebrewDay)+' '+r.hebrewMonthName+(r.hebrewYear?' '+hYear(r.hebrewYear):''):'';
    const tot=(r.durationMin||0)+(r.giftMinutes||0);
    return[cl?.name||r.clockId,r.date||'',hd,r.hebrewDayStr||'',r.entryTime||'',r.exitTime||'',
      r.type==='gift'?'':String(r.durationMin||0),String(r.giftMinutes||0),String(tot),(r.notes||'').replace(/\n/g,' '),r.type==='gift'?'מתנה':'רגיל'];
  });
  const csv=[hdr,...rows].map(row=>row.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=`attendance_${S.today}.csv`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

// ─────────────────────────────────────────────
function switchTab(t){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  document.getElementById('panel-'+t).classList.add('active');
  if(t==='main')renderMain();
  if(t==='history')renderHistory();
  if(t==='settings')renderSettings();
}

// ─────────────────────────────────────────────
//  OVERLAY
// ─────────────────────────────────────────────
function openOv(html){
  document.getElementById('ov-body').innerHTML=html;
  document.getElementById('ov-scrim').classList.add('open');
  document.getElementById('ov-panel').classList.add('open');
  setTimeout(()=>{const f=document.querySelector('#ov-panel input:not([type="hidden"]),#ov-panel textarea,#ov-panel select');if(f)f.focus();},230);
}
function closeOv(){
  document.getElementById('ov-scrim').classList.remove('open');
  document.getElementById('ov-panel').classList.remove('open');
}

// ─────────────────────────────────────────────
//  UTILS
// ─────────────────────────────────────────────
function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ─────────────────────────────────────────────
//  THEME
// ─────────────────────────────────────────────
function applyTheme(th){
  if(!th?.colorScheme)return;
  const cs=th.colorScheme,r=document.documentElement;
  r.style.setProperty('--color-primary',    cs.primary);
  r.style.setProperty('--color-on-primary', cs.onPrimary);
  r.style.setProperty('--color-secondary',  cs.secondary);
  r.style.setProperty('--color-on-secondary',cs.onSecondary);
  r.style.setProperty('--color-surface',    cs.surface);
  r.style.setProperty('--color-on-surface', cs.onSurface);
  r.style.setProperty('--color-surface-container-highest',cs.surfaceContainerHighest);
  r.style.setProperty('--color-error',    cs.error);
  r.style.setProperty('--color-on-error', cs.onError);
  r.style.setProperty('--color-outline',  cs.outline);
  r.style.setProperty('--color-primary-subtle',   rgba(cs.primary,0.12));
  r.style.setProperty('--color-secondary-subtle', rgba(cs.secondary,0.12));
  document.body.classList.toggle('dark-mode',th.mode==='dark');
  if(th.typography){const t=th.typography;
    r.style.setProperty('--font-main',     `'${t.fontFamily}', 'David', serif`);
    r.style.setProperty('--font-size-base',`${t.fontSize}px`);
    r.style.setProperty('--line-height',   String(t.lineHeight));
  }
}
function rgba(hex,a){if(!hex||hex.length<7)return`rgba(103,80,164,${a})`;return`rgba(${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)},${a})`;}

// ─────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────
Otzaria.on('plugin.boot',async(p)=>{
  applyTheme(p.theme);
  await load();
  try{const r=await Otzaria.call('calendar.getJewishDate');if(r.success&&r.data)S.heb=r.data;}catch(e){console.warn(e);}
  renderMain();renderSettings();
});
Otzaria.on('theme.changed',applyTheme);
</script>
