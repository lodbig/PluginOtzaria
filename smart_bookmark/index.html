<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>סימניה חכמה - הקפאת לימוד</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-primary: #6750A4; --color-on-primary: #FFFFFF;
      --color-secondary: #625B71; --color-on-secondary: #FFFFFF;
      --color-surface: #FFFBFE; --color-on-surface: #1C1B1F;
      --color-surface-container-highest: #E6E0E9;
      --color-error: #B3261E; --color-on-error: #FFFFFF;
      --color-outline: #79747E;
      --color-primary-subtle: rgba(103,80,164,0.12);
      --color-secondary-subtle: rgba(98,91,113,0.12);
      
      --font-main: 'Frank Ruhl Libre', 'David', serif;
      --font-size-base: 18px;
      --line-height: 1.5;
      
      --radius-sm: 8px; 
      --radius-md: 12px;
    }

    body {
      font-family: var(--font-main);
      font-size: var(--font-size-base);
      line-height: var(--line-height);
      background: var(--color-surface);
      color: var(--color-on-surface);
      direction: rtl;
      padding: 24px;
      min-height: 100vh;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-outline);
      border-radius: var(--radius-md);
      padding: 24px;
      margin-bottom: 16px;
      display: none;
    }

    .card.active {
      display: block;
      animation: fadeIn 0.3s ease-out;
    }

    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: 16px;
    }

    .text-body { margin-bottom: 16px; }
    
    .ref-highlight {
      background: var(--color-primary-subtle);
      color: var(--color-primary);
      padding: 4px 8px;
      border-radius: var(--radius-sm);
      font-weight: bold;
      display: inline-block;
      margin: 8px 0;
    }

    .date-badge {
      font-size: 0.85em;
      color: var(--color-secondary);
      background: var(--color-secondary-subtle);
      padding: 4px 10px;
      border-radius: 999px;
      float: left;
    }

    textarea.input {
      width: 100%;
      height: 120px;
      padding: 12px;
      border: 1.5px solid var(--color-outline);
      border-radius: var(--radius-sm);
      font-family: var(--font-main);
      font-size: 1rem;
      color: var(--color-on-surface);
      background: var(--color-surface);
      direction: rtl;
      outline: none;
      resize: vertical;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }

    textarea.input:focus { border-color: var(--color-primary); }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
      flex-wrap: wrap; /* למקרה שיש הרבה כפתורים במסך צר */
    }

    .btn-primary, .btn-secondary, .btn-danger {
      border: none;
      border-radius: var(--radius-sm);
      padding: 10px 24px;
      font-family: var(--font-main);
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-primary { background: var(--color-primary); color: var(--color-on-primary); }
    .btn-secondary { background: var(--color-secondary-subtle); color: var(--color-on-surface); border: 1px solid var(--color-outline); }
    .btn-danger { background: rgba(179, 38, 30, 0.1); color: var(--color-error); border: 1px solid var(--color-error); }

    .btn-primary:hover, .btn-secondary:hover, .btn-danger:hover { opacity: 0.85; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    
    .saved-thought {
      border-right: 4px solid var(--color-primary);
      padding-right: 12px;
      font-style: italic;
      margin: 16px 0;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <div class="container">
    
    <div id="view-empty" class="card">
      <div class="card-title">הסימניה החכמה מוכנה</div>
      <div class="text-body">
        כדי להקפיא את הלימוד שלך, פתח ספר כלשהו באוצריא, לחץ <b>לחצן ימני</b> על הטקסט, ובחר בתפריט <b>"הקפא לימוד"</b>.
      </div>
    </div>

    <div id="view-edit" class="card">
      <div class="card-title">הקפאת לימוד</div>
      <div id="edit-ref" class="ref-highlight"></div>
      <div class="text-body" style="font-weight: bold;">
        על מה בדיוק חשבת עכשיו? / מה השאלה שנשארת איתה?
      </div>
      <textarea id="thought-input" class="input" placeholder="כתוב כאן את השאלה או המחשבה שאיתה סיימת..."></textarea>
      <div class="actions">
        <button class="btn-primary" onclick="saveThought()">שמור סימניה מוקפאת</button>
        <button class="btn-secondary" onclick="cancelEdit()">בטל</button>
      </div>
    </div>

    <div id="view-saved" class="card">
      <span id="saved-date" class="date-badge"></span>
      <div class="card-title">הלימוד מוקפא ונשמר</div>
      <div class="text-body">הנקודה שמורה. תוכל לחזור אליה מיד כשתפתח את התוכנה מחדש.</div>
      <div id="saved-ref" class="ref-highlight"></div>
      
      <div class="saved-thought" id="saved-text-display"></div>
      
      <div class="actions">
        <!-- הוספנו כפתור פתיחת מיקום ככפתור הראשי (Primary) -->
        <button class="btn-primary" onclick="openSavedLocation()">פתח מיקום</button>
        <button class="btn-secondary" onclick="editSavedThought()">עדכן תשובה</button>
        <button class="btn-danger" onclick="deleteSaved()">מחק שמירה זו</button>
      </div>
    </div>

  </div>

  <script>
    const STORAGE_KEY = 'smart_bookmark_data';
    let currentState = null;

    // --- אתחול עיצוב מה-API ---
    function applyTheme(theme) {
      if (!theme || !theme.colorScheme) return;
      const cs = theme.colorScheme;
      const r = document.documentElement;
      r.style.setProperty('--color-primary', cs.primary);
      r.style.setProperty('--color-on-primary', cs.onPrimary);
      r.style.setProperty('--color-secondary', cs.secondary);
      r.style.setProperty('--color-on-secondary', cs.onSecondary);
      r.style.setProperty('--color-surface', cs.surface);
      r.style.setProperty('--color-on-surface', cs.onSurface);
      r.style.setProperty('--color-surface-container-highest', cs.surfaceContainerHighest);
      r.style.setProperty('--color-error', cs.error);
      r.style.setProperty('--color-on-error', cs.onError);
      r.style.setProperty('--color-outline', cs.outline);
      
      const hexToRgba = (hex, alpha) => {
        const r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
      };
      r.style.setProperty('--color-primary-subtle', hexToRgba(cs.primary, 0.12));
      r.style.setProperty('--color-secondary-subtle', hexToRgba(cs.secondary, 0.12));

      document.body.classList.toggle('dark-mode', theme.mode === 'dark');
      if (theme.typography) {
        r.style.setProperty('--font-main', `'${theme.typography.fontFamily}', 'David', serif`);
        r.style.setProperty('--font-size-base', `${theme.typography.fontSize}px`);
        r.style.setProperty('--line-height', String(theme.typography.lineHeight));
      }
    }

    // --- עיבוד טקסט לתצוגת מיקום משולבת עם שם הספר ---
    function getDisplayText(loc) {
      if (!loc) return 'מיקום לא ידוע';
      
      const title = loc.bookTitle || '';
      const ref = loc.ref || '';
      
      if (!title && !ref) return 'מיקום לא ידוע';
      if (!title) return ref;
      if (!ref) return title;
      
      // אם מראה המקום כבר כולל את שם הספר, נחזיר רק אותו כדי למנוע כפילות
      if (ref.includes(title)) {
        return ref;
      }
      
      // אחרת, נשלב: שם הספר | מראה מקום
      return `${title} | ${ref}`;
    }

    // --- המרת תאריך לטקסט ידידותי ---
    function formatFriendlyDate(isoString) {
      if (!isoString) return '';
      const date = new Date(isoString);
      const today = new Date();
      const isToday = date.getDate() === today.getDate() && 
                      date.getMonth() === today.getMonth() && 
                      date.getFullYear() === today.getFullYear();
      
      const timeStr = date.toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' });
      if (isToday) {
        return `היום בשעה ${timeStr}`;
      }
      return `${date.toLocaleDateString('he-IL')} בשעה ${timeStr}`;
    }

    // --- ניהול ממשק המשתמש (Views) ---
    function showView(viewId) {
      document.getElementById('view-empty').classList.remove('active');
      document.getElementById('view-edit').classList.remove('active');
      document.getElementById('view-saved').classList.remove('active');
      document.getElementById(viewId).classList.add('active');
    }

    function updateUiFromState() {
      if (!currentState) {
        showView('view-empty');
        return;
      }

      const locationText = getDisplayText(currentState.location);

      if (currentState.status === 'pending') {
        document.getElementById('edit-ref').innerText = locationText;
        document.getElementById('thought-input').value = currentState.text || '';
        showView('view-edit');
      } 
      else if (currentState.status === 'saved') {
        document.getElementById('saved-ref').innerText = locationText;
        document.getElementById('saved-text-display').innerText = currentState.text || '(לא הוזנה מחשבה)';
        document.getElementById('saved-date').innerText = formatFriendlyDate(currentState.timestamp);
        showView('view-saved');
      }
    }

    // --- פעולות כפתורים בתוך התוסף ---
    async function saveThought() {
      if (!currentState) return; 

      const text = document.getElementById('thought-input').value;
      currentState.text = text;
      currentState.status = 'saved';
      currentState.timestamp = new Date().toISOString();
      
      await Otzaria.call('storage.set', { key: STORAGE_KEY, value: currentState });
      
      await Otzaria.call('ui.showSuccess', { 
        message: 'הסימניה נשמרה בהצלחה. ניתן כעת לסגור את התוכנה.' 
      });
      
      updateUiFromState();
    }

    function editSavedThought() {
      if (!currentState) return;
      currentState.status = 'pending';
      updateUiFromState();
    }

    async function cancelEdit() {
      if (currentState && currentState.text && currentState.timestamp) {
        currentState.status = 'saved';
      } else {
        currentState = null;
        await Otzaria.call('storage.remove', { key: STORAGE_KEY });
      }
      updateUiFromState();
    }

    async function deleteSaved() {
      currentState = null;
      await Otzaria.call('storage.remove', { key: STORAGE_KEY });
      await Otzaria.call('ui.showMessage', { message: 'השמירה נמחקה.' });
      updateUiFromState();
    }

    // הפונקציה החדשה לפתיחת המיקום
    async function openSavedLocation() {
      if (!currentState || !currentState.location) return;
      
      // פותח את הספר במיקום
      await Otzaria.call('reader.openBook', {
        bookId: currentState.location.bookId,
        index: currentState.location.index
      });
      
      // מנווט את האפליקציה למסך הקריאה כדי לראות את הספר
      await Otzaria.call('navigation.goTo', { target: 'reading' });
    }

    // --- טעינת הנתונים ---
    async function loadSavedData() {
      const storageRes = await Otzaria.call('storage.get', { key: STORAGE_KEY });
      const savedData = storageRes.success ? storageRes.data : null;
      
      if (savedData && savedData.status === 'saved') {
        currentState = savedData;
        const timeStr = formatFriendlyDate(savedData.timestamp);
        const locationText = getDisplayText(savedData.location);
        
        const confirmRes = await Otzaria.call('ui.showConfirm', {
          title: 'חזרה מהקפאת לימוד',
          subtitle: `נשמר: ${timeStr}`,
          content: `חשבת אז:\n"${savedData.text}"\n\nהאם לחזור למקום שהיית? [ ${locationText} ]`
        });

        if (confirmRes.success && confirmRes.data && confirmRes.data.confirmed) {
          // פותח את הספר
          await Otzaria.call('reader.openBook', {
            bookId: savedData.location.bookId,
            index: savedData.location.index
          });
          // עובר למסך הקריאה
          await Otzaria.call('navigation.goTo', { target: 'reading' });
          
          // מוחק את ההקפאה (כי המשתמש "הפשיר" אותה)
          await Otzaria.call('storage.remove', { key: STORAGE_KEY });
          currentState = null;
        }
      } else if (savedData && savedData.status === 'pending') {
        currentState = savedData;
      }
      
      updateUiFromState();
    }

    // ==========================================
    // --- Initialization ---
    // ==========================================
    Otzaria.on('plugin.boot', async (p) => {
      if (p && p.theme && p.theme.colorScheme) applyTheme(p.theme);
      
      await Otzaria.call('reader.addContextMenuItem', {
        id: 'freeze-learning',
        label: 'הקפא לימוד',
        icon: 'bookmark'
      });

      await loadSavedData();
    });

    Otzaria.on('theme.changed', (theme) => {
      if (theme && theme.colorScheme) applyTheme(theme);
    });

    // --- מאזין ללחיצה על תפריט ההקשר ---
    Otzaria.on('reader.context_menu_item_clicked', async (data) => {
      if (data.itemId !== 'freeze-learning') return;

      currentState = {
        status: 'pending',
        location: {
          bookId: data.currentBookId,
          bookTitle: data.currentBook, // שמירה מפורשת של שם הספר
          ref: data.currentRef || '', 
          index: data.currentIndex
        },
        text: '',
        timestamp: new Date().toISOString()
      };
      
      await Otzaria.call('storage.set', { key: STORAGE_KEY, value: currentState });
      updateUiFromState();

      const confirmRes = await Otzaria.call('ui.showConfirm', {
        title: 'הקפאת לימוד',
        content: 'על מה בדיוק חשבת עכשיו? / מה השאלה שנשארת איתה?\n\nעבור לתוסף כדי לענות (לאחר האישור תועבר אוטומטית).'
      });

      if (confirmRes.success && confirmRes.data && confirmRes.data.confirmed) {
        await Otzaria.call('navigation.goTo', { target: 'more' });
      }
    });
  </script>
</body>
</html>
